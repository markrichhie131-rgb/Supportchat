<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Support</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overscroll-behavior: none; }
    
    .chat-container {
      width: 100%; max-width: 430px; height: 100vh; background: #ffffff;
      display: flex; flex-direction: column; box-shadow: 0 5px 25px rgba(0,0,0,0.05);
      position: relative;
    }
    
    .chat-header {
      background: #ffffff; padding: 14px 16px; border-bottom: 1px solid #eeeeee;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    /* FIX: Added flex: 1 and min-height: 0 to force it to respect parent boundaries */
    .messages-area {
      flex: 1; min-height: 0; padding: 16px; overflow-y: auto; background: #f8f9fa;
      display: flex; flex-direction: column; gap: 12px;
    }

    .typing-status-bar { padding: 4px 16px; font-size: 12px; font-style: italic; color: #777777; background: #f8f9fa; min-height: 22px; flex-shrink: 0; }

    /* FIX: Added flex-shrink: 0 to prevent the input from being squashed */
    .input-area {
      padding: 12px; border-top: 1px solid #eeeeee; display: flex;
      gap: 8px; background: white; align-items: center; flex-shrink: 0;
    }
    
    /* ... (rest of your existing CSS remains the same) ... */
    .media-btn { background: #f0f0f0; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .input-area input[type="text"] { flex: 1; height: 42px; border: 1px solid #dddddd; border-radius: 22px; padding: 0 16px; outline: none; }
    .input-area button[type="submit"] { background: #16c516; color: white; border: none; height: 42px; padding: 0 20px; border-radius: 22px; font-weight: 600; cursor: pointer; }
    .setup-screen { padding: 30px 10px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; }
    .message.customer { background: #16c516; color: white; margin-left: auto; }
    .message.support { background: #e9e9e9; color: #111111; margin-right: auto; }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">Cash-app Support</div>
    
    <div class="messages-area" id="msgArea">
      <div class="setup-screen" id="setupForm">
        <h2>Connect with Support</h2>
        <input type="text" id="userName" placeholder="Your Name" />
        <input type="email" id="userEmail" placeholder="Your Email Address" />
        <button id="startChatBtn">Start Chat</button>
      </div>
    </div>

    <div class="typing-status-bar" id="typingTicker"></div>

    <form class="input-area" id="chatForm" style="display: none;">
      <input type="file" id="fileInput" accept="image/*" style="display: none;" />
      <button type="button" class="media-btn" id="paperclipBtn">📎</button>
      <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    // ... (Your existing JavaScript remains here)
  </script>
</body>
</html>
