<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Support</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      /* Added to prevent tap highlight color on mobile */
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      /* Ensures the page doesn't bounce/scroll at the edges */
      overscroll-behavior: none;
    }
    .chat-container {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 5px 25px rgba(0,0,0,0.05);
    }
    
    /* UPDATED: PERFECTLY CENTRALIZED TOPBAR BRANDING ROW */
    .chat-header {
      background: #ffffff;
      color: #000000;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: center; 
      gap: 10px;
      font-weight: 600;
      font-size: 16px;
      flex-shrink: 0;
      border-bottom: 1px solid #eeeeee;
    }
    .header-brand-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .header-left-img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      border-radius: 50%;
    }
    .header-title-container {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header-verified-tick {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .messages-area {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #f8f9fa;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .message.customer {
      background: #16c516;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .message.support {
      background: #e9e9e9;
      color: #111111;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }
    .message img {
      max-width: 100%;
      border-radius: 12px;
      margin-bottom: 4px;
      display: block;
    }
    
    .meta-wrapper {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-top: 4px;
      font-size: 10px;
      opacity: 0.7;
    }
    .message.support .meta-wrapper {
      justify-content: flex-start;
    }
    .read-status.read {
      color: #34b7f1;
    }
    .read-status.unread {
      color: #b0b0b0;
    }

    .typing-status-bar {
      padding: 4px 16px;
      font-size: 12px;
      font-style: italic;
      color: #777777;
      background: #f8f9fa;
      min-height: 22px;
    }

    .input-area {
      padding: 12px;
      border-top: 1px solid #eeeeee;
      display: flex;
      gap: 8px;
      background: white;
      align-items: center;
    }
    
    .media-btn {
      background: #f0f0f0;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .input-area input[type="text"] {
      flex: 1;
      height: 42px;
      border: 1px solid #dddddd;
      border-radius: 22px;
      padding: 0 16px;
      outline: none;
      font-size: 14px;
    }
    .input-area button[type="submit"] {
      background: #16c516;
      color: white;
      border: none;
      height: 42px;
      padding: 0 20px;
      border-radius: 22px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .setup-screen {
      padding: 30px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .setup-screen h2 {
      font-size: 18px;
      text-align: center;
    }
    .setup-screen input {
      height: 44px;
      border: 1px solid #dddddd;
      border-radius: 10px;
      padding: 0 12px;
      outline: none;
    }
    .setup-screen button {
      height: 44px;
      background: #16c516;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      <div class="header-brand-group">
        <img src="Cash.png" alt="Icon" class="header-left-img" onerror="this.style.display='none';" />
        <div class="header-title-container">
          <span>Cash-app Support</span>
          <img src="verified.png" alt="✓" class="header-verified-tick" onerror="this.style.display='none';" />
        </div>
      </div>
    </div>
    
    <div class="messages-area" id="msgArea">
      <div class="setup-screen" id="setupForm">
        <h2>Connect with Support</h2>
        <input type="text" id="userName" placeholder="Your Name" />
        <input type="email" id="userEmail" placeholder="Your Email Address" />
        <button id="startChatBtn">Start Chat</button>
      </div>
    </div>

    <div class="typing-status-bar" id="typingTicker"></div>

    <form class="input-area" id="chatForm" style="display: none;">
      <input type="file" id="fileInput" accept="image/*" style="display: none;" />
      <button type="button" class="media-btn" id="paperclipBtn">📎</button>
      
      <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const socket = io();
    let currentCustomerId = localStorage.getItem("bash_cust_id") || null;
    let typingTimeout = null;

    const setupForm = document.getElementById("setupForm");
    const chatForm = document.getElementById("chatForm");
    const msgArea = document.getElementById("msgArea");
    const chatInput = document.getElementById("chatInput");
    const fileInput = document.getElementById("fileInput");
    const paperclipBtn = document.getElementById("paperclipBtn");
    const typingTicker = document.getElementById("typingTicker");

    socket.emit("customer-start", { customerId: currentCustomerId });

    socket.on("customer-ready", function(data) {
      currentCustomerId = data.customerId;
      localStorage.setItem("bash_cust_id", data.customerId);
      
      if (data.conversation && data.conversation.name !== "Guest") {
        setupForm.style.display = "none";
        chatForm.style.display = "flex";
        renderHistory(data.conversation.messages);
        socket.emit("customer-read-receipt", { customerId: currentCustomerId });
      }
    });

    document.getElementById("startChatBtn").addEventListener("click", function() {
      const name = document.getElementById("userName").value.trim();
      const email = document.getElementById("userEmail").value.trim();
      if (!name) return alert("Please enter your name.");
      
      socket.emit("customer-profile", { customerId: currentCustomerId, name, email });
      setupForm.style.display = "none";
      chatForm.style.display = "flex";
    });

    chatInput.addEventListener("input", function() {
      if (!currentCustomerId) return;
      socket.emit("customer-typing", { customerId: currentCustomerId, isTyping: true });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(function() {
        socket.emit("customer-typing", { customerId: currentCustomerId, isTyping: false });
      }, 2000);
    });

    paperclipBtn.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", function() {
      const file = this.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        socket.emit("customer-message", {
          customerId: currentCustomerId,
          text: "[Sent an Image]",
          image: e.target.result
        });
      };
      reader.readAsDataURL(file);
      this.value = "";
    });

    chatForm.addEventListener("submit", function(e) {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (!text) return;

      clearTimeout(typingTimeout);
      socket.emit("customer-typing", { customerId: currentCustomerId, isTyping: false });

      socket.emit("customer-message", {
        customerId: currentCustomerId,
        text: text,
        image: null
      });
      chatInput.value = "";
    });

    socket.on("customer-message-received", data => {
      if (data.customerId === currentCustomerId) renderHistory(data.conversation.messages);
    });

    socket.on("admin-message-sent", data => {
      if (data.customerId === currentCustomerId) {
        renderHistory(data.conversation.messages);
        socket.emit("customer-read-receipt", { customerId: currentCustomerId });
      }
    });

    socket.on("messages-marked-read", function() {
      if (currentCustomerId) {
        fetch("/conversation/" + currentCustomerId)
          .then(res => res.json())
          .then(convo => { if (convo && convo.messages) renderHistory(convo.messages); });
      }
    });

    socket.on("admin-typing-status", function(isAdminTyping) {
      typingTicker.textContent = isAdminTyping ? "Agent is typing..." : "";
    });

    function renderHistory(messages) {
      if (setupForm.style.display !== "none") return;
      msgArea.innerHTML = "";
      if (!messages || messages.length === 0) return;

      messages.forEach(function(msg) {
        const bubble = document.createElement("div");
        bubble.className = "message " + (msg.sender === "customer" ? "customer" : "support");

        if (msg.image) {
          const img = document.createElement("img");
          img.src = msg.image;
          bubble.appendChild(img);
        }

        const textDiv = document.createElement("div");
        textDiv.textContent = msg.text === "[Sent an Image]" && msg.image ? "" : msg.text;
        if (textDiv.textContent) bubble.appendChild(textDiv);

        const metaDiv = document.createElement("div");
        metaDiv.className = "meta-wrapper";

        const timeSpan = document.createElement("span");
        timeSpan.textContent = msg.time || "";
        metaDiv.appendChild(timeSpan);

        if (msg.sender === "customer") {
          const statusSpan = document.createElement("span");
          statusSpan.className = "read-status " + (msg.read ? "read" : "unread");
          statusSpan.textContent = " ✓✓";
          metaDiv.appendChild(statusSpan);
        }

        bubble.appendChild(metaDiv);
        msgArea.appendChild(bubble);
      });
      msgArea.scrollTop = msgArea.scrollHeight;
    }
  </script>
</body>
</html>
