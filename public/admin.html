<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bashapp Admin Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      font-family: -apple-system, sans-serif; 
      -webkit-tap-highlight-color: transparent; 
    }
    body { 
      display: flex; 
      height: 100vh; 
      background: #f0f2f5; 
      color: #333; 
      overscroll-behavior: none; 
    }
    
    #loginScreen {
      position: fixed; top:0; left:0; width:100vw; height:100vh; background:#f0f2f5;
      display:flex; justify-content:center; align-items:center; z-index:999;
    }
    .login-card { background:white; padding:30px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); width:320px; text-align:center;}
    .login-card h2 { margin-bottom:15px; font-size:20px; }
    .login-card input { width:100%; height:40px; margin-bottom:12px; padding:0 10px; border:1px solid #ddd; border-radius:6px; outline:none; }
    .login-card button { width:100%; height:40px; background:#16c516; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; }

    .sidebar { width: 320px; background: white; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid #e0e0e0; font-weight: bold; font-size: 18px; }
    .convo-list { flex: 1; overflow-y: auto; }
    
    .convo-item {
      padding: 14px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center; position: relative;
    }
    .convo-item:hover { background: #fafafa; }
    .convo-item.active { background: #e6f7e6; }
    .convo-meta { flex: 1; margin-right: 8px; }
    .convo-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
    .convo-preview { font-size: 12px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .badge { background: #16c516; color: white; font-size: 11px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
    
    .delete-convo-btn {
      background: none; border: none; color: #ff3b30; font-size: 16px; cursor: pointer; padding: 4px; display: none;
    }
    .convo-item:hover .delete-convo-btn { display: block; }

    .main-chat { flex: 1; display: flex; flex-direction: column; background: #f7f9fa; }
    .chat-header { background: white; padding: 16px; border-bottom: 1px solid #e0e0e0; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    .messages-view { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    
    .msg { max-width: 65%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
    .msg.customer { background: white; border: 1px solid #e0e0e0; align-self: flex-start; }
    .msg.support { background: #16c516; color: white; align-self: flex-end; }
    .msg img { max-width: 100%; border-radius: 8px; margin-bottom: 4px; display: block; }
    .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }

    .typing-indicator { padding: 6px 20px; font-size: 12px; font-style: italic; color: #666; min-height: 24px; }

    .input-bar { padding: 16px; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; align-items: center; }
    .input-bar input[type="text"] { flex: 1; height: 40px; border: 1px solid #ddd; border-radius: 6px; padding: 0 12px; outline: none; }
    .media-btn { background: #f0f0f0; border: none; width: 40px; height: 40px; border-radius: 6px; cursor: pointer; font-size: 16px; }
    .input-bar button[type="submit"] { height: 40px; background: #16c516; color: white; border: none; padding: 0 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div id="loginScreen">
    <div class="login-card">
      <h2>Bashapp Backoffice</h2>
      <input type="password" id="passInput" placeholder="Enter System Password" />
      <button id="loginBtn">Authenticate</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">Conversations</div>
    <div class="convo-list" id="convoList"></div>
  </div>

  <div class="main-chat">
    <div class="chat-header">
      <span id="activeChatTitle">Select a thread to begin</span>
    </div>
    <div class="messages-view" id="messagesView"></div>
    <div class="typing-indicator" id="adminTypingTicker"></div>
    
    <form class="input-bar" id="adminForm" style="visibility: hidden;">
      <input type="file" id="adminFileInput" accept="image/*" style="display: none;" />
      <button type="button" class="media-btn" id="adminPaperclipBtn">📎</button>
      <input type="text" id="adminInput" placeholder="Type a response..." autocomplete="off" />
      <button type="submit">Reply</button>
    </form>
  </div>

  <script>
    const socket = io();
    let selectedCustomerId = null;
    let adminTypingTimeout = null;

    document.getElementById("loginBtn").addEventListener("click", () => {
      const password = document.getElementById("passInput").value;
      socket.emit("admin-login", password);
    });

    socket.on("admin-login-success", (conversations) => {
      document.getElementById("loginScreen").style.display = "none";
      renderSidebar(conversations);
    });

    socket.on("admin-login-failed", () => alert("Invalid administrative credential string configuration."));
    socket.on("conversations", (conversations) => renderSidebar(conversations));

    function renderSidebar(conversations) {
      const list = document.getElementById("convoList");
      list.innerHTML = "";
      
      for (const id in conversations) {
        const convo = conversations[id];
        const item = document.createElement("div");
        item.className = "convo-item" + (id === selectedCustomerId ? " active" : "");
        item.onclick = () => selectThread(id);

        const meta = document.createElement("div");
        meta.className = "convo-meta";
        
        const name = document.createElement("div");
        name.className = "convo-name";
        name.textContent = convo.name + " (" + (convo.email || "Guest") + ")";
        
        const lastMsg = convo.messages[convo.messages.length - 1];
        const preview = document.createElement("div");
        preview.className = "convo-preview";
        preview.textContent = lastMsg ? lastMsg.text : "No messages yet";

        meta.appendChild(name);
        meta.appendChild(preview);
        item.appendChild(meta);

        if (convo.unread > 0) {
          const badge = document.createElement("span");
          badge.className = "badge";
          badge.textContent = convo.unread;
          item.appendChild(badge);
        }

        const delBtn = document.createElement("button");
        delBtn.className = "delete-convo-btn";
        delBtn.innerHTML = "🗑️";
        delBtn.onclick = (e) => {
          e.stopPropagation(); 
          if (confirm("Are you sure you want to completely erase this user conversation thread data profile?")) {
            socket.emit("delete-conversation", id);
            if (selectedCustomerId === id) {
              selectedCustomerId = null;
              document.getElementById("messagesView").innerHTML = "";
              document.getElementById("activeChatTitle").textContent = "Select a thread to begin";
              document.getElementById("adminForm").style.visibility = "hidden";
            }
          }
        };
        item.appendChild(delBtn);
        list.appendChild(item);
      }
    }

    function selectThread(id) {
      selectedCustomerId = id;
      document.getElementById("adminForm").style.visibility = "visible";
      socket.emit("select-customer-thread", id);
      socket.emit("mark-read", id);
    }

    socket.on("thread-data", (convo) => {
      if (!convo || convo.id !== selectedCustomerId) return;
      document.getElementById("activeChatTitle").textContent = convo.name;
      renderMessages(convo.messages);
    });

    socket.on("customer-message-received", (data) => {
      if (selectedCustomerId && data.customerId === selectedCustomerId) {
        renderMessages(data.conversation.messages);
        socket.emit("mark-read", selectedCustomerId);
      }
    });

    socket.on("admin-message-sent", (data) => {
      if (selectedCustomerId && data.customerId === selectedCustomerId) {
        renderMessages(data.conversation.messages);
      }
    });

    socket.on("customer-typing-status", (data) => {
      if (selectedCustomerId && data.customerId === selectedCustomerId) {
        document.getElementById("adminTypingTicker").textContent = data.isTyping ? "Customer is typing..." : "";
      }
    });

    const adminInput = document.getElementById("adminInput");
    adminInput.addEventListener("input", () => {
      if (!selectedCustomerId) return;
      socket.emit("admin-typing", { customerId: selectedCustomerId, isTyping: true });
      clearTimeout(adminTypingTimeout);
      adminTypingTimeout = setTimeout(() => {
        socket.emit("admin-typing", { customerId: selectedCustomerId, isTyping: false });
      }, 2000);
    });

    const adminFileInput = document.getElementById("adminFileInput");
    document.getElementById("adminPaperclipBtn").addEventListener("click", () => adminFileInput.click());

    adminFileInput.addEventListener("change", function() {
      const file = this.files[0];
      if (!file || !selectedCustomerId) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        socket.emit("admin-message", {
          customerId: selectedCustomerId,
          text: "[Sent an Image]",
          image: e.target.result
        });
      };
      reader.readAsDataURL(file);
      this.value = "";
    });

    document.getElementById("adminForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const text = adminInput.value.trim();
      if (!text || !selectedCustomerId) return;

      clearTimeout(adminTypingTimeout);
      socket.emit("admin-typing", { customerId: selectedCustomerId, isTyping: false });

      socket.emit("admin-message", { customerId: selectedCustomerId, text, image: null });
      adminInput.value = "";
    });

    function renderMessages(messages) {
      const view = document.getElementById("messagesView");
      view.innerHTML = "";
      messages.forEach(msg => {
        const wrap = document.createElement("div");
        wrap.className = "msg " + msg.sender;

        if (msg.image) {
          const img = document.createElement("img");
          img.src = msg.image;
          wrap.appendChild(img);
        }

        const txt = document.createElement("div");
        txt.textContent = msg.text === "[Sent an Image]" && msg.image ? "" : msg.text;
        if (txt.textContent) wrap.appendChild(txt);

        const time = document.createElement("div");
        time.className = "msg-time";
        time.textContent = msg.time + (msg.sender === 'customer' ? (msg.read ? " (Read)" : " (Unread)") : "");
        wrap.appendChild(time);

        view.appendChild(wrap);
      });
      view.scrollTop = view.scrollHeight;
    }
  </script>
</body>
</html>
