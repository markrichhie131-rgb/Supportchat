<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bashapp Admin Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { display: flex; height: 100vh; width: 100vw; background: #f0f2f5; color: #333; overscroll-behavior: none; overflow: hidden; }
    
    #loginScreen { position: fixed; top:0; left:0; width:100vw; height:100vh; background:#f0f2f5; display:flex; justify-content:center; align-items:center; z-index:999; }
    .login-card { background:white; padding:30px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); width:320px; text-align:center;}
    .login-card input { width:100%; height:40px; margin-bottom:12px; padding:0 10px; border:1px solid #ddd; border-radius:6px; outline:none; }
    .login-card button { width:100%; height:40px; background:#16c516; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; }

    .sidebar { width: 320px; flex-shrink: 0; background: white; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
    .convo-list { flex: 1; overflow-y: auto; }
    .convo-item { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    
    .main-chat { flex: 1; display: none; flex-direction: column; background: #f7f9fa; min-width: 0; }
    @media (min-width: 601px) { .main-chat { display: flex; } }
    body.chat-active .sidebar { display: none; }
    body.chat-active .main-chat { display: flex; }

    .chat-header { background: white; padding: 16px; border-bottom: 1px solid #e0e0e0; font-weight: bold; display: flex; align-items: center; gap: 10px; }
    #backBtn { cursor: pointer; font-size: 20px; display: none; }
    @media (max-width: 600px) { body.chat-active #backBtn { display: block; } }

    .messages-view { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; }
    .msg.customer { background: white; border: 1px solid #ddd; align-self: flex-start; }
    .msg.support { background: #16c516; color: white; align-self: flex-end; }
    .input-bar { padding: 16px; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; }
    .input-bar input { flex: 1; height: 40px; border: 1px solid #ddd; border-radius: 6px; padding: 0 12px; }
  </style>
</head>
<body>
  <div id="loginScreen"><div class="login-card"><h2>Admin</h2><input type="password" id="passInput" /><button id="loginBtn">Login</button></div></div>
  <div class="sidebar"><div class="sidebar-header">Conversations</div><div class="convo-list" id="convoList"></div></div>
  <div class="main-chat">
    <div class="chat-header"><span id="backBtn" onclick="goBack()">←</span><span id="activeChatTitle">Select a thread</span></div>
    <div class="messages-view" id="messagesView"></div>
    <form class="input-bar" id="adminForm" style="visibility: hidden;">
      <input type="text" id="adminInput" placeholder="Reply..." />
      <button type="submit">Send</button>
    </form>
  </div>
  <script>
    const socket = io();
    let selectedCustomerId = null;
    function goBack() { document.body.classList.remove('chat-active'); selectedCustomerId = null; }
    document.getElementById("loginBtn").onclick = () => socket.emit("admin-login", document.getElementById("passInput").value);
    socket.on("admin-login-success", (c) => { document.getElementById("loginScreen").style.display = "none"; renderSidebar(c); });
    socket.on("conversations", renderSidebar);
    function renderSidebar(conversations) {
      const list = document.getElementById("convoList"); list.innerHTML = "";
      for (const id in conversations) {
        const convo = conversations[id];
        const item = document.createElement("div");
        item.className = "convo-item";
        item.onclick = () => { selectedCustomerId = id; document.body.classList.add('chat-active'); document.getElementById("adminForm").style.visibility = "visible"; socket.emit("select-customer-thread", id); };
        item.innerHTML = `<div><strong>${convo.name}</strong></div><button onclick="event.stopPropagation(); if(confirm('Delete profile?')) socket.emit('delete-conversation', '${id}');">🗑️</button>`;
        list.appendChild(item);
      }
    }
    socket.on("thread-data", (convo) => { document.getElementById("activeChatTitle").textContent = convo.name; renderMessages(convo.messages); });
    function renderMessages(m) { const v = document.getElementById("messagesView"); v.innerHTML = ""; m.forEach(msg => v.innerHTML += `<div class="msg ${msg.sender}">${msg.text}</div>`); v.scrollTop = v.scrollHeight; }
    document.getElementById("adminForm").onsubmit = (e) => { e.preventDefault(); socket.emit("admin-message", { customerId: selectedCustomerId, text: document.getElementById("adminInput").value, image: null }); document.getElementById("adminInput").value = ""; };
  </script>
</body>
</html>
